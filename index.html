<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Susun Barang PRO</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

h1 {
    color: #fff;
}

.container {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 30px;
}

.items, .targets {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.item {
    padding: 15px;
    background: #4CAF50;
    color: white;
    cursor: grab;
    border-radius: 10px;
    transition: transform 0.2s;
}

.item:active {
    transform: scale(1.1);
}

.target {
    width: 150px;
    height: 50px;
    border: 2px dashed #333;
    line-height: 50px;
    border-radius: 10px;
    background: #fff;
    transition: 0.3s;
}

.correct {
    background: #90EE90 !important;
    transform: scale(1.1);
}

#info {
    margin-top: 20px;
    font-size: 20px;
    color: #fff;
}
</style>
</head>

<body>

<h1>🧺 Game Susun Barang PRO</h1>

<div id="info">
Level: <span id="level">1</span> |
Skor: <span id="score">0</span> |
Waktu: <span id="time">30</span>s
</div>

<div class="container">
    <div class="items" id="items"></div>
    <div class="targets" id="targets"></div>
</div>

<!-- Sound -->
<audio id="benar" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="salah" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let level = 1;
let score = 0;
let time = 30;
let draggedItem = null;
let timer;

const levels = [
    {
        items: ["Baju", "Sepatu", "Buku"],
        targets: ["Lemari", "Rak Sepatu", "Rak Buku"]
    },
    {
        items: ["Sendok", "Piring", "Gelas", "Pisau"],
        targets: ["Tempat Sendok", "Rak Piring", "Rak Gelas", "Tempat Pisau"]
    }
];

function startLevel() {
    clearInterval(timer);
    document.getElementById("items").innerHTML = "";
    document.getElementById("targets").innerHTML = "";
    time = 30;
    document.getElementById("time").textContent = time;

    let data = levels[level - 1];

    data.items.forEach(item => {
        let el = document.createElement("div");
        el.className = "item";
        el.textContent = item;
        el.id = item;
        el.draggable = true;

        el.addEventListener("dragstart", () => draggedItem = el);

        document.getElementById("items").appendChild(el);
    });

    data.targets.forEach((target, index) => {
        let el = document.createElement("div");
        el.className = "target";
        el.textContent = target;
        el.dataset.match = data.items[index];

        el.addEventListener("dragover", e => e.preventDefault());

        el.addEventListener("drop", function () {
            if (draggedItem.id === this.dataset.match) {
                this.textContent = draggedItem.textContent + " ✔";
                this.classList.add("correct");
                draggedItem.style.display = "none";
                score++;
                document.getElementById("score").textContent = score;
                document.getElementById("benar").play();

                if (score % data.items.length === 0) {
                    levelUp();
                }
            } else {
                document.getElementById("salah").play();
                alert("❌ Salah!");
            }
        });

        document.getElementById("targets").appendChild(el);
    });

    startTimer();
}

function startTimer() {
    timer = setInterval(() => {
        time--;
        document.getElementById("time").textContent = time;

        if (time === 0) {
            clearInterval(timer);
            alert("⏰ Waktu habis!");
            startLevel();
        }
    }, 1000);
}

function levelUp() {
    document.getElementById("win").play();

    if (level < levels.length) {
        level++;
        document.getElementById("level").textContent = level;
        alert("🎉 Naik Level!");
        startLevel();
    } else {
        alert("🏆 Kamu Menang Semua Level!");
        location.reload();
    }
}

startLevel();
</script>

</body>
</html>
