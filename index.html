<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Edukasi Susun Barang</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #a8e063, #56ab2f);
}

/* Tema Islami */
h1 {
    color: #fff;
    font-size: 40px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 40px;
}

.items, .targets {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.item {
    padding: 25px;
    font-size: 22px;
    background: #2E7D32;
    color: white;
    cursor: grab;
    border-radius: 15px;
    transition: transform 0.2s ease;
}

.item:active {
    transform: scale(1.1);
}

.dragging {
    opacity: 0.5;
    transform: scale(1.15);
}

.target {
    width: 260px;
    height: 70px;
    font-size: 20px;
    border: 3px dashed #1b5e20;
    line-height: 70px;
    border-radius: 15px;
    background: #fff;
    transition: 0.3s;
}

.target:hover {
    background: #dcedc8;
}

.correct {
    background: #a5d6a7 !important;
    transform: scale(1.05);
}

#info {
    margin-top: 20px;
    font-size: 24px;
    color: #fff;
}

/* Leaderboard */
#leaderboard {
    margin-top: 30px;
    color: white;
}
</style>
</head>

<body>

<h1>📚 Game Edukasi Susun Barang</h1>

<div id="info">
Level: <span id="level">1</span> |
Skor: <span id="score">0</span> |
Waktu: <span id="time">30</span>s
</div>

<div class="container">
    <div class="items" id="items"></div>
    <div class="targets" id="targets"></div>
</div>

<div id="leaderboard">
<h2>🏆 Leaderboard</h2>
<ol id="scoreList"></ol>
</div>

<!-- Sound -->
<audio id="benar" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="salah" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b5c79.mp3?filename=happy-kids-113985.mp3" type="audio/mpeg"></audio>

<script>
let level = 1;
let score = 0;
let time = 30;
let draggedItem = null;
let timer;

const levels = [
    {
        items: ["Buku","Pensil","Tas"],
        targets: ["Rak Buku","Tempat Pensil","Rak Tas"]
    },
    {
        items: [
            "Al-Qur'an","Sajadah","Sarung",
            "Mukena","Tas","Buku",
            "Pulpen","Penghapus","Penggaris"
        ],
        targets: [
            "Rak Qur'an","Tempat Sajadah","Lemari Sarung",
            "Lemari Mukena","Rak Tas","Rak Buku",
            "Tempat Pulpen","Tempat Penghapus","Tempat Penggaris"
        ]
    },
    {
        items: [
            "Laptop","Mouse","Keyboard",
            "Flashdisk","Charger","Headset",
            "Buku","Tas","Pensil",
            "Pulpen","Penghapus","Penggaris"
        ],
        targets: [
            "Meja Laptop","Tempat Mouse","Rak Keyboard",
            "Tempat Flashdisk","Tempat Charger","Rak Headset",
            "Rak Buku","Rak Tas","Tempat Pensil",
            "Tempat Pulpen","Tempat Penghapus","Tempat Penggaris"
        ]
    }
];

function startLevel() {
    clearInterval(timer);
    document.getElementById("items").innerHTML = "";
    document.getElementById("targets").innerHTML = "";
    time = 30 + (level * 5);
    document.getElementById("time").textContent = time;

    let data = levels[level - 1];

    data.items.forEach(item => {
        let el = document.createElement("div");
        el.className = "item";
        el.textContent = item;
        el.id = item;
        el.draggable = true;

        el.addEventListener("dragstart", () => {
            draggedItem = el;
            el.classList.add("dragging");
        });

        el.addEventListener("dragend", () => {
            el.classList.remove("dragging");
        });

        document.getElementById("items").appendChild(el);
    });

    data.targets.forEach((target, index) => {
        let el = document.createElement("div");
        el.className = "target";
        el.textContent = target;
        el.dataset.match = data.items[index];

        el.addEventListener("dragover", e => e.preventDefault());

        el.addEventListener("drop", function () {
            if (draggedItem.id === this.dataset.match) {
                this.textContent = draggedItem.textContent + " ✔";
                this.classList.add("correct");
                draggedItem.style.display = "none";
                score++;
                document.getElementById("score").textContent = score;
                document.getElementById("benar").play();

                if (score % data.items.length === 0) {
                    levelUp();
                }
            } else {
                document.getElementById("salah").play();
                alert("❌ Salah!");
            }
        });

        document.getElementById("targets").appendChild(el);
    });

    startTimer();
}

function startTimer() {
    timer = setInterval(() => {
        time--;
        document.getElementById("time").textContent = time;

        if (time === 0) {
            clearInterval(timer);
            saveScore();
            alert("⏰ Waktu habis!");
            startLevel();
        }
    }, 1000);
}

/* Leaderboard */
function saveScore() {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];
    scores.push(score);
    scores.sort((a,b) => b - a);
    scores = scores.slice(0,5);
    localStorage.setItem("scores", JSON.stringify(scores));
    showScores();
}

function showScores() {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];
    let list = document.getElementById("scoreList");
    list.innerHTML = "";
    scores.forEach(s => {
        let li = document.createElement("li");
        li.textContent = s;
        list.appendChild(li);
    });
}

function levelUp() {
    document.getElementById("win").play();

    if (level < levels.length) {
        level++;
        document.getElementById("level").textContent = level;
        alert("🎉 Naik Level!");
        startLevel();
    } else {
        saveScore();
        alert("🏆 Kamu Menang!");
        location.reload();
    }
}

showScores();
startLevel();
</script>

</body>
</html>
